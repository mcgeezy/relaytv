name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  packages: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Create or publish release
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  release-image:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Set image creation time
        id: created
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.release-please.outputs.tag_name }}
            ghcr.io/${{ github.repository }}:${{ needs.release-please.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            RELAYTV_IMAGE_SOURCE=https://github.com/${{ github.repository }}
            RELAYTV_IMAGE_REVISION=${{ needs.release-please.outputs.sha }}
            RELAYTV_IMAGE_VERSION=${{ needs.release-please.outputs.tag_name }}
            RELAYTV_IMAGE_CREATED=${{ steps.created.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
