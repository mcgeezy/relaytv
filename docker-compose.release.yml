services:
  relaytv:
    user: "${PUID:-1000}:${PGID:-1000}"
    image: "${RELAYTV_IMAGE_REF:-ghcr.io/mcgeezy/relaytv:latest}"
    pull_policy: "${RELAYTV_PULL_POLICY:-missing}"
    container_name: relaytv
    network_mode: host
    shm_size: "512m"

    restart: unless-stopped
    env_file:
      - .env

    environment:
      # Optional display/session passthrough (leave unset for headless runtime).
      - QT_X11_NO_MITSHM=1
      - DISPLAY=${DISPLAY-}
      - XDG_SESSION_TYPE=${RELAYTV_HOST_SESSION_TYPE:-${XDG_SESSION_TYPE-}}
      - RELAYTV_HOST_SESSION_TYPE=${RELAYTV_HOST_SESSION_TYPE:-${XDG_SESSION_TYPE-}}
      - RELAYTV_MODE=${RELAYTV_MODE:-}
      - XAUTHORITY=/tmp/.Xauthority
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR:-/run/user/${PUID:-1000}}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY-}
      - QT_QPA_PLATFORM=${QT_QPA_PLATFORM-}

      - HOME=/tmp
      - XDG_CACHE_HOME=/tmp/.cache
      - XDG_CONFIG_HOME=/tmp/.config

    tmpfs:
      - /tmp

    volumes:
      - ./data:/data
      - ./bin:/opt/relaytv/bin:rw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /sys:/sys:ro
      - /run/udev:/run/udev:ro
      # Needed only when running with a host X11 display.
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${RELAYTV_XAUTHORITY_HOST_PATH:-/dev/null}:/tmp/.Xauthority:ro
      - /run/user/${PUID:-1000}:/run/user/${PUID:-1000}:rw

    working_dir: /app

    devices:
      - /dev/snd:/dev/snd
      - /dev/dri:/dev/dri

    group_add:
      - audio
      - video
      - "${RELAYTV_RENDER_GID:-992}"

    security_opt:
      - apparmor:unconfined

    tty: true
    stdin_open: true
